name: python-deployment
run-name: ${{github.actor}} - ${{github.hash}}

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.8'
  DOCKER_IMAGE_NAME: 'kube2py'

jobs:
  python-ci:
    name: Python CI

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage flake8
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          coverage run manage.py test

      - name: Show coverage report
        run: |
          coverage report

      - name: Lint with flake8
        continue-on-error: true
        run: |
          cd ../
          flake8 . --show-source --statistics

      - name: Check complexity
        continue-on-error: true
        run: |
          cd ../
          flake8 . --statistics --max-complexity=10

      - name: Upload Python Code as artifact
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: python-code-package
          path: ./src

  build-image:
    name: Build and Push Image
    needs: ['python-ci']
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-code-package

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{github.sha}}